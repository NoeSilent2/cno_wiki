<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/e46aa30d4b.js" crossorigin="anonymous"></script>
        <title>{% block title %}C&O Wiki{% endblock %}</title>
        <style>
            * { margin: 0; box-sizing: border-box; }
            body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;; background-color: #000000; color: #ffffff; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column;}
            header { border-bottom: 1px solid #333333; padding: 0; }
            nav {max-width: 1200px; margin: 0 auto; display: flex; align-items: center; padding: 1rem 0.5rem; gap: 2rem;}
            a { color: #fff; text-decoration: none; font-weight: bold; }
            a:hover { text-decoration: underline #fff; }
            .logo { font-size: 1.25rem; font-weight: 600; color: #ffffff; text-decoration: none; margin:0px 10px;}
            .nav-links { display: flex; margin-left: auto;}
            .nav-links a { text-decoration: none; color: #888888; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; }
            .nav-links a:hover { color: #ffffff; background-color: #111111; }
            .dropdown {overflow: hidden;}
            .dropdown .dropbtn {border:none; outline: none; text-decoration:none; color: #888; background-color: #000; padding: 0.5rem 1rem; border-radius: 6px 6px 0px 0px; font-size: 0.875rem; font-weight: 500; font-family: inherit; margin: 0;}
            .dropdown:hover .dropbtn { color:#fff; background-color: #111}
            .dropdown-content {display: none; position:absolute; min-width:120px; z-index:1; background-color: #111; border-radius: 0px 6px 6px 6px;}
            .dropdown-content a {float: none; padding: 12px 16px; display:block; text-align:left;}
            .dropdown-content a:hover {background-color: #333;}
            .dropdown:hover .dropdown-content {display: block;}
            main { max-width: 1200px; flex: 1; width: 90%; margin: 2rem auto; padding: 2rem 2rem; display: flex; flex-direction: column; text-align: left; border-radius: 8px; border: 1px solid #333333; }
            h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; color: #ffffff }
            h2 { font-size: 2rem; font-weight: normal; display: block; border-bottom: 1px solid #333333; margin-bottom: 1rem; }
            .roundy {border-radius:10px;}
            .infobox {box-sizing:border-box;float:right;width:400px;max-width:50%;}
            form input {background:#111; color:white; border-radius:6px; padding:4px;}
            form button {background:#333; color:white; border-radius:6px; padding:4px; cursor:pointer;}
        </style>
        {% block extra_head %}{% endblock %}
    </head>
    <body>
        <header>
            <nav>
                <a href="/" class="logo">C&O Wiki</a>
                <form method="get" action="{{ url_for('search_species') }}">
                    <input type="text" name="q" placeholder="Enter species or move name...">
                    <button type="submit"><i style="background:transparent" class="fa fa-search"></i></button>
                </form>
                <div class="nav-links">
                    <div class="dropdown">
                        <button class="dropbtn">
                            <a href="/staff" style="padding:0px">Server</a>
                        </button>
                        <div class="dropdown-content">
                            <a href="/staff">Staff</a>
                            <a href="https://discord.gg/hZ3QReRAcu">Discord</a>
                            <a href="http://67.189.184.7:25566/">Bluemap</a>
                            <a href="https://www.curseforge.com/minecraft/modpacks/cobblemon-and-origins">Modpack</a>
                            <a href="https://github.com/NoeSilent2/cno_wiki">GitHub</a>
                        </div>
                    </div>
                    <div class="dropdown">
                        <button class="dropbtn">
                            <a href="/species" style="padding:0px">Pokemon</a>
                        </button>
                        <div class="dropdown-content">
                            <a href="/species">All Species</a>
                            <a href="/fakemon">Fakemon</a>
                            <a href="/fakeforms">Fakeforms</a>
                            <a href="/fossilmons">Fossilmons</a>
                            <a href="/species/random">Random Species</a>
                        </div>
                    </div>
                    <div class="dropdown">
                        <button class="dropbtn">
                            <a href="/moves" style="padding:0px">Battle</a>
                        </button>
                        <div class="dropdown-content">
                            <a href="/cmoves">New Moves</a>
                            <a href="/moves">All Moves</a>
                            <a href="/dmoves">Default Moves</a>
                        </div>
                    </div>
                </div>
            </nav>
        </header>
        {% block body %}

        {% endblock %}
    </body>
</html>
