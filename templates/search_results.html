{% extends 'species_table.html' %}


{% block title %}Search Results - {{ super() }}{% endblock %}

{% block body %}
{% block main %}
<main>
    <h2>Search Results for "{{ query }}"</h2>
    <form method="get" action="{{ url_for('search_species') }}">
        <input type="text" name="q" placeholder="Enter species name..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>
    <p style="margin-top: 20px; color: #666; font-size: 14px; margin-bottom: 10px">Click on any column header to sort the table.</p>
    <div id="species"></div>
    <div id="moves"></div>
</main>
{% endblock %}
<script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
<script>
    const all_results = {{ results | tojson }};
    
    const species = all_results['species']

    new gridjs.Grid({
        columns: [
            {name:"Dex",width:"50px"}, 
            {name:"Name",width:"145px", formatter: (cell, row) => gridjs.html(`<a href='/species/${row.cells[4].data}'>${cell}</a>`)}, 
            {name:"Type",width:"82px", formatter: (cell, row) => {
                if (row.cells[3].data) {
                    return gridjs.html(`<div style="display:flex"><div style="height:36px; padding:0px 1px 0px 0px"><img src="/types/${cell}.png" title="${cell}" alt="${cell}"></div><div style="height:36px;"><img src="/types/${row.cells[3].data}.png" title="${row.cells[3].data}" alt="${row.cells[3].data}"></div></div>`)
                } else {
                    return gridjs.html(`<div style="height:36px"><img src="/types/${cell}.png" title="${cell}" alt="${cell}"></div>`)
                }
            }}, 
            {name:"Type2",width:"10px",hidden:true},
            {name:"internal_name",hidden:true}],
        data: species.map(emp => [
            emp.national_pokedex_number,
            emp.name,
            emp.types.primary,
            emp.types.secondary,
            emp.internal_name,
        ]),
        sort: true,
        style: {
            table: {
                border: '3px solid #fff',
                width: 'auto'
            },
            th: {
                'background-color': '#333',
                color: '#fff',
                'border-bottom': '3px solid #fff',
                padding: "4px"
            },
            td: {
                'background-color': '#000',
                color: '#fff',
                border: '1px solid #ccc',
                padding: "4px"
            }
        }
    }).render(document.getElementById('species'));

    const moves = all_results['moves']

    new gridjs.Grid({
        columns: [
        {name:"Name",width:"160px", formatter: (cell, row) => gridjs.html(`<a href='/moves/${row.cells[1].data}'>${cell}</a>`)},
        {name:"",hidden:true},
        {name:"",width:"30px",formatter: (cell, row) => gridjs.html(`<div style="height:100%; width:100%;"><img style="height:24px; width:24px; display:block; margin:auto; image-rendering:pixelated" src="/types/${cell}.png" title="${cell}" alt="${cell}"></div>`)},
        {name:"",width:"30px",formatter: (cell, row) => gridjs.html(`<div style="height:100%; width:100%;"><img style="height:24px; width:36px; display:block; margin:auto; image-rendering:pixelated" src="/categories/${cell}.png" title="${cell}" alt="${cell}"></div>`)}],
        data: moves.map(emp => [
            emp.name,
            emp.id,
            emp.type,
            emp.category
        ]),
        sort: true,
        style: {
            table: {
                border: '3px solid #fff',
                width: 'auto'
            },
            th: {
                'background-color': '#333',
                color: '#fff',
                'border-bottom': '3px solid #fff',
                padding: "4px"
            },
            td: {
                'background-color': '#000',
                color: '#fff',
                border: '1px solid #ccc',
                padding: "4px"
            }
        }
    }).render(document.getElementById('moves'));
</script>
{% endblock %}
